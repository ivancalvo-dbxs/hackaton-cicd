# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/aws/en/dev-tools/bundles/settings

bundle:
  name: bike_sharing_bundle

include:
  - resources/**/*.yml

variables:
  warehouse_id:
    description: Default SQL warehouse ID for SQL tasks and alerts.
    default: ""
  notification_email:
    description: Email for job failure notifications.
    default: "ivan.calvo@databricks.com"
  catalog:
    description: Unity Catalog name.
    default: icalvo_hackaton_ws_catalog
  staging_sp_app_id:
    description: Service principal application ID for staging deployments.
    default: ""
  prod_sp_app_id:
    description: Service principal application ID for production deployments.
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com

  staging:
    mode: production
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.staging_sp_app_id}

  prod:
    mode: production
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.prod_sp_app_id}
    permissions:
      - level: CAN_VIEW
        group_name: users
